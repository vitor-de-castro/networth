<!DOCTYPE html>
<html>
<head>
  <title>Request Error - NetWorth</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a1929 0%, #1a2f4a 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .error-container {
      text-align: center;
      max-width: 600px;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 700;
      color: #DAB656;
      margin-bottom: 1rem;
      line-height: 1;
    }

    .error-title {
      font-size: 2rem;
      color: #ffffff;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .error-message {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .back-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: #DAB656;
      color: #0a1929;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(218, 182, 86, 0.3);
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(218, 182, 86, 0.4);
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }

    @media (max-width: 768px) {
      .error-code {
        font-size: 5rem;
      }

      .error-title {
        font-size: 1.5rem;
      }

      .error-message {
        font-size: 1rem;
      }

      .emoji {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>
  <div class="error-container">
    <span class="emoji">🚫</span>
    <div class="error-code">422</div>
    <h1 class="error-title">Invalid Request</h1>
    <p class="error-message">
      The change you wanted was rejected. Please try again or contact support if the problem persists.
    </p>
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </div>
</body>
</html>
